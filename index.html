<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HemoLearn — AI Blood Science Education</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,400;0,600;0,800;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blood:#8b0000;--blood2:#c0392b;--blood3:#e74c3c;--blood-glow:rgba(200,30,30,0.35);
  --cyber:#00fff0;--cyber2:#00c8c8;--cyber-glow:rgba(0,255,240,0.2);
  --void:#04040a;--void2:#080812;--void3:#0d0d1e;--void4:#111128;--void5:#161635;
  --grid:rgba(0,255,240,0.04);--gridl:rgba(0,255,240,0.08);
  --text:#e8e8ff;--text2:#8888bb;--text3:#444477;
  --disp:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;--body:'Exo 2',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;cursor:default}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--blood2);border-radius:2px}

/* SCANLINE OVERLAY */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

/* CANVAS */
#vein-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.6}

/* GRID BG */
.grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}

/* CONTENT */
.app{position:relative;z-index:1}

/* NAV */
.nav{
  position:sticky;top:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:62px;
  background:rgba(4,4,10,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,255,240,0.1);
}
.nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyber),transparent)}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none}
.logo-mark{
  position:relative;width:36px;height:36px;
  border:1.5px solid var(--blood2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(139,0,0,0.15);overflow:hidden;
}
.logo-mark::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(192,57,43,0.3),transparent)}
.logo-mark-h{font-family:var(--disp);font-size:1.3rem;font-weight:700;color:var(--blood3);position:relative;z-index:1}
.logo-name{font-family:var(--disp);font-size:1.5rem;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.logo-name .hl{color:var(--blood3)}.logo-name .lr{color:var(--cyber)}
.nav-right{display:flex;gap:2px;background:var(--void3);border:1px solid rgba(0,255,240,0.08);border-radius:8px;padding:3px}
.ntab{
  padding:7px 15px;border-radius:5px;border:none;cursor:pointer;
  font-family:var(--mono);font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);background:transparent;transition:all .2s;position:relative;
}
.ntab:hover{color:var(--cyber2)}
.ntab.on{background:var(--void5);color:var(--cyber);border:1px solid rgba(0,255,240,0.15)}
.ntab.on::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:16px;height:1px;background:var(--cyber)}
.nbadge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:0.58rem;background:var(--blood2);color:#fff;margin-left:5px}

/* HERO */
.hero{
  min-height:93vh;display:flex;align-items:center;justify-content:center;
  padding:4rem 2rem;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(139,0,0,0.12) 0%,transparent 65%);
}
.hero-inner{text-align:center;max-width:900px;position:relative;z-index:2}
.h-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:5px 16px;border-radius:2px;margin-bottom:2.5rem;
  border:1px solid rgba(0,255,240,0.2);background:rgba(0,255,240,0.03);
  font-family:var(--mono);font-size:0.68rem;color:var(--cyber2);letter-spacing:2px;text-transform:uppercase;
}
.h-eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--cyber);box-shadow:0 0 8px var(--cyber);animation:cyberpulse 2s infinite}
@keyframes cyberpulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--cyber)}50%{opacity:.4;box-shadow:0 0 2px var(--cyber)}}

.h-title{font-family:var(--disp);font-size:clamp(4rem,10vw,8.5rem);font-weight:700;line-height:.9;letter-spacing:6px;text-transform:uppercase}
.h-title .line1{color:var(--text3);display:block}
.h-title .line2{display:block;position:relative}
.h-title .line2-text{
  background:linear-gradient(90deg,var(--blood2),var(--blood3),#ff6b6b,var(--blood2));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:bloodflow 4s linear infinite;
}
@keyframes bloodflow{0%{background-position:0% center}100%{background-position:200% center}}
.h-title .line3{color:var(--cyber);display:block;text-shadow:0 0 30px var(--cyber-glow)}

.h-sub{font-family:var(--body);font-size:1.05rem;font-weight:300;color:var(--text2);line-height:1.8;max-width:560px;margin:2rem auto 0;letter-spacing:.3px}
.h-sub strong{color:var(--text);font-weight:600}

.h-btns{display:flex;gap:12px;justify-content:center;margin-top:2.5rem;flex-wrap:wrap}
.btn-blood{
  padding:13px 32px;border:1px solid var(--blood2);border-radius:3px;cursor:pointer;
  background:rgba(139,0,0,0.2);color:var(--text);font-family:var(--mono);
  font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;
  transition:all .25s;position:relative;overflow:hidden;
}
.btn-blood::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(192,57,43,0.3),transparent);opacity:0;transition:.25s}
.btn-blood:hover{border-color:var(--blood3);box-shadow:0 0 25px var(--blood-glow),inset 0 0 20px rgba(192,57,43,0.1);transform:translateY(-1px)}
.btn-blood:hover::before{opacity:1}
.btn-cyber{
  padding:13px 32px;border:1px solid rgba(0,255,240,0.25);border-radius:3px;cursor:pointer;
  background:rgba(0,255,240,0.04);color:var(--cyber2);font-family:var(--mono);
  font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;transition:all .25s;
}
.btn-cyber:hover{border-color:var(--cyber);box-shadow:0 0 20px var(--cyber-glow);color:var(--cyber)}

.h-kpis{display:flex;margin-top:4rem;border:1px solid rgba(0,255,240,0.1);border-radius:3px;overflow:hidden;background:rgba(8,8,18,0.8)}
.kpi{padding:1.4rem 2rem;text-align:center;border-right:1px solid rgba(0,255,240,0.07);flex:1;position:relative}
.kpi:last-child{border-right:none}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,240,0.2),transparent)}
.kpi-n{font-family:var(--disp);font-size:2.2rem;font-weight:700;letter-spacing:2px;line-height:1}
.kpi-n.blood{color:var(--blood3);text-shadow:0 0 20px var(--blood-glow)}
.kpi-n.cyber{color:var(--cyber);text-shadow:0 0 20px var(--cyber-glow)}
.kpi-n.dim{color:var(--text2)}
.kpi-l{font-family:var(--mono);font-size:0.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:5px}

/* PAGE */
.page{padding:2.5rem 2rem 5rem;max-width:1200px;margin:0 auto}
.pg-head{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(0,255,240,0.07)}
.pg-title{font-family:var(--disp);font-size:2.5rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;line-height:1;display:flex;align-items:center;gap:14px}
.pg-title .t-blood{color:var(--blood3);text-shadow:0 0 20px var(--blood-glow)}
.pg-title .t-cyber{color:var(--cyber);text-shadow:0 0 15px var(--cyber-glow)}
.pg-title .t-dim{color:var(--text3)}
.pg-sub{color:var(--text3);font-family:var(--mono);font-size:.72rem;line-height:1.65;margin-top:.75rem;letter-spacing:.5px}

/* PANEL */
.panel{
  background:rgba(8,8,18,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(0,255,240,0.08);border-radius:4px;
  position:relative;overflow:hidden;transition:border-color .25s;
}
.panel:hover{border-color:rgba(0,255,240,0.15)}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,240,0.15),transparent)}
.panel-head{padding:.85rem 1.25rem;border-bottom:1px solid rgba(0,255,240,0.07);display:flex;align-items:center;gap:10px;background:rgba(0,255,240,0.02)}
.ph-dot{width:6px;height:6px;border-radius:50%;background:var(--blood3);box-shadow:0 0 8px var(--blood-glow);animation:cyberpulse 2s infinite}
.ph-label{font-family:var(--mono);font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px}
.ph-label .accent{color:var(--cyber2)}
.panel-body{padding:1.25rem}

/* SECTION LABEL */
.slbl{font-family:var(--mono);font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
.slbl::before{content:'//';color:var(--blood2)}
.slbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,255,240,0.1),transparent)}

/* BLOOD GROUP BUTTONS */
.bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.bgb{
  aspect-ratio:1;border-radius:3px;
  border:1px solid rgba(0,255,240,0.1);background:rgba(13,13,30,0.8);
  color:var(--text3);font-family:var(--disp);font-size:1.15rem;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.bgb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(192,57,43,0.2),transparent);opacity:0;transition:.2s}
.bgb:hover{border-color:rgba(192,57,43,0.5);color:var(--text)}
.bgb:hover::after{opacity:1}
.bgb.active{border-color:var(--blood2);color:var(--blood3);background:rgba(139,0,0,0.2);box-shadow:0 0 16px var(--blood-glow),inset 0 0 12px rgba(192,57,43,0.08)}
.bgb.active::after{opacity:1}

/* RESULT BANNER */
.result-strip{
  padding:1rem 1.25rem;margin:1rem 0;border-radius:3px;
  display:flex;align-items:center;gap:14px;border:1px solid;
  font-family:var(--disp);font-size:1.4rem;font-weight:700;letter-spacing:3px;
}
.result-strip.ok{border-color:rgba(0,255,128,0.35);background:rgba(0,255,128,0.05);color:#00ff80}
.result-strip.ok .rs-icon::before{content:'▲ COMPATIBLE';color:#00ff80;text-shadow:0 0 15px rgba(0,255,128,0.5)}
.result-strip.no{border-color:rgba(192,57,43,0.45);background:rgba(139,0,0,0.1);color:var(--blood3)}
.result-strip.no .rs-icon::before{content:'■ INCOMPATIBLE';color:var(--blood3);text-shadow:0 0 15px var(--blood-glow)}
.rs-detail{font-family:var(--mono);font-size:.68rem;color:var(--text3);margin-top:4px;letter-spacing:1px}

/* FACT BAR */
.fact-bar{padding:.8rem 1rem;margin:.8rem 0;border-radius:2px;background:rgba(192,57,43,0.06);border-left:2px solid var(--blood2);font-family:var(--mono);font-size:.72rem;color:var(--text2);line-height:1.65}
.fact-bar strong{color:var(--blood3)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:3px 10px;border-radius:2px;font-family:var(--mono);font-size:.68rem;letter-spacing:.5px;border:1px solid}
.chip.g{color:#00ff80;border-color:rgba(0,255,128,0.3);background:rgba(0,255,128,0.05)}
.chip.b{color:var(--blood3);border-color:rgba(192,57,43,0.3);background:rgba(139,0,0,0.08)}
.chip.c{color:var(--cyber2);border-color:rgba(0,255,240,0.2);background:rgba(0,255,240,0.04)}
.chip.dim{color:var(--text3);border-color:rgba(255,255,255,0.08);background:transparent;opacity:.5}

/* AI PANEL */
.ai-panel{border-radius:3px;border:1px solid rgba(192,57,43,0.2);overflow:hidden;background:rgba(4,4,12,0.9);margin-top:1rem}
.ai-head{padding:.75rem 1rem;border-bottom:1px solid rgba(192,57,43,0.15);display:flex;align-items:center;gap:8px;background:rgba(139,0,0,0.08)}
.ai-pulse{width:6px;height:6px;border-radius:50%;background:var(--blood3);animation:cyberpulse 1.5s infinite}
.ai-lbl{font-family:var(--mono);font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px}
.ai-lbl .ac{color:var(--blood3)}
.ai-body{padding:1rem;font-family:var(--body);font-size:.84rem;line-height:1.78;color:var(--text2);min-height:80px;white-space:pre-wrap}
.ai-body.loading{color:var(--text3);font-style:italic;font-family:var(--mono);font-size:.72rem}

/* XBTN */
.xbtn{
  width:100%;padding:11px;border-radius:2px;margin-top:.75rem;
  border:1px solid rgba(192,57,43,0.35);background:rgba(139,0,0,0.1);
  color:var(--blood3);font-family:var(--mono);font-size:.72rem;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.xbtn:hover:not(:disabled){border-color:var(--blood2);background:rgba(139,0,0,0.2);box-shadow:0 0 18px var(--blood-glow)}
.xbtn:disabled{opacity:.3;cursor:not-allowed}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%;min-height:460px}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:10px;min-height:360px}
.msg{max-width:90%;padding:9px 13px;border-radius:3px;font-family:var(--body);font-size:.83rem;line-height:1.65}
.msg.u{align-self:flex-end;background:rgba(139,0,0,0.15);border:1px solid rgba(192,57,43,0.3);color:var(--text);border-bottom-right-radius:0}
.msg.a{align-self:flex-start;background:var(--void3);border:1px solid rgba(0,255,240,0.1);color:var(--text2);border-bottom-left-radius:0}
.msg.typing{color:var(--text3);font-family:var(--mono);font-size:.7rem;font-style:italic}
.chat-foot{padding:.9rem;border-top:1px solid rgba(0,255,240,0.07);display:flex;gap:8px}
.chat-inp{
  flex:1;padding:9px 13px;border-radius:2px;
  border:1px solid rgba(0,255,240,0.12);background:var(--void3);
  color:var(--text);font-family:var(--mono);font-size:.75rem;letter-spacing:.5px;outline:none;transition:.2s;
}
.chat-inp::placeholder{color:var(--text3)}
.chat-inp:focus{border-color:rgba(0,255,240,0.3);box-shadow:0 0 12px rgba(0,255,240,0.06)}
.chat-send{
  padding:9px 18px;border-radius:2px;border:1px solid rgba(192,57,43,0.4);
  background:rgba(139,0,0,0.15);color:var(--blood3);
  font-family:var(--mono);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;
}
.chat-send:hover:not(:disabled){background:rgba(139,0,0,0.28);box-shadow:0 0 14px var(--blood-glow)}
.chat-send:disabled{opacity:.3;cursor:not-allowed}

/* LAYOUTS */
.lab-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.crisis-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:1.25rem}
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:900px){.lab-grid,.crisis-grid,.case-grid{grid-template-columns:1fr}}
@media(max-width:640px){.h-kpis{flex-wrap:wrap}.kpi{min-width:50%;border-right:none!important;border-bottom:1px solid rgba(0,255,240,0.07)}.ntab span{display:none}}

/* WORLD MAP */
.map-wrap{position:relative;width:100%;height:420px;border-radius:4px;overflow:hidden;border:1px solid rgba(0,255,240,0.1);background:var(--void2);margin-bottom:1.25rem}
#world-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.map-tip{
  position:absolute;pointer-events:none;
  background:rgba(4,4,14,0.96);backdrop-filter:blur(12px);
  border:1px solid rgba(0,255,240,0.2);border-radius:3px;
  padding:9px 13px;font-size:.78rem;white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,.6);z-index:50;opacity:0;transition:opacity .1s;
}
.map-tip-name{font-family:var(--disp);font-size:.95rem;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.map-tip-row{font-family:var(--mono);font-size:.68rem;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px}
.tip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.map-legend{position:absolute;bottom:10px;right:12px;display:flex;flex-direction:column;gap:5px}
.legend-row{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:.62rem;color:var(--text3)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* CRISIS BARS */
.cbar{display:flex;align-items:center;gap:10px;padding:5px 4px;border-bottom:1px solid rgba(0,255,240,0.04);cursor:pointer;border-radius:2px;transition:background .15s}
.cbar:last-child{border-bottom:none}
.cbar:hover,.cbar.sel{background:rgba(139,0,0,0.06)}
.cbar-flag{font-size:.95rem;width:22px;text-align:center;flex-shrink:0}
.cbar-name{width:88px;font-family:var(--mono);font-size:.7rem;color:var(--text2);flex-shrink:0;letter-spacing:.5px}
.cbar-track{flex:1;height:22px;background:var(--void3);border-radius:2px;overflow:hidden}
.cbar-fill{height:100%;border-radius:2px;display:flex;align-items:center;padding:0 7px;transition:width 1.3s cubic-bezier(.16,1,.3,1)}
.cbar-pct{font-family:var(--mono);font-size:.65rem;color:rgba(255,255,255,.8);letter-spacing:.5px}
.cbar-need{width:68px;text-align:right;font-family:var(--mono);font-size:.62rem;color:var(--text3);flex-shrink:0}

/* REGION FILTER */
.rfilter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.rfbtn{padding:4px 12px;border-radius:2px;border:1px solid rgba(0,255,240,0.08);background:var(--void3);color:var(--text3);font-family:var(--mono);font-size:.65rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.rfbtn:hover{color:var(--cyber2);border-color:rgba(0,255,240,0.2)}
.rfbtn.on{background:rgba(0,255,240,0.05);color:var(--cyber);border-color:rgba(0,255,240,0.25)}

/* SELECTED COUNTRY CARD */
.sel-card{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:1rem 1.25rem;margin-bottom:1.25rem;border-radius:3px;border:1px solid;background:rgba(4,4,14,0.9);transition:border-color .3s}
.sel-flag{font-size:2rem}
.sel-meta .sel-name{font-family:var(--disp);font-size:1.6rem;font-weight:700;letter-spacing:2px}
.sel-meta .sel-region{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.sel-shortage{margin-left:auto;text-align:right}
.sel-pct{font-family:var(--disp);font-size:2.4rem;font-weight:700;letter-spacing:2px;line-height:1}
.sel-pct-lbl{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.sel-stats{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.ssel{padding:.6rem .9rem;background:var(--void3);border-radius:2px;border:1px solid rgba(0,255,240,0.07);text-align:center}
.ssel-l{font-family:var(--mono);font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.ssel-v{font-family:var(--disp);font-size:1.2rem;font-weight:700;letter-spacing:1px;line-height:1.2}

/* CASES */
.diff-tag{display:inline-block;padding:3px 9px;border-radius:2px;font-family:var(--mono);font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase}

// VEIN CANVAS BACKGROUND
// ═══════════════════════════════════════════════════════
(function initCanvas(){
  const c = document.getElementById('vein-canvas');
  const ctx = c.getContext('2d');
  let W, H, cells = [], veins = [], tick = 0;
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  function mkCell(){
    return {
      x:Math.random()*W, y:Math.random()*H,
      r:6+Math.random()*20,
      vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.22,
      phase:Math.random()*Math.PI*2,
      speed:.007+Math.random()*.009,
      type:Math.random()<.6?'rbc':Math.random()<.5?'wbc':'plt',
      alpha:.04+Math.random()*.09, rot:Math.random()*Math.PI*2,
      rotS:(Math.random()-.5)*.007,
    };
  }
  function mkVein(){
    return {
      pts:[], color:Math.random()<.6?'rgba(139,0,0,.08)':'rgba(0,255,240,.04)',
      width:.6+Math.random()*.8, flow:0, speed:.003+Math.random()*.005,
    };
  }
  function buildVeins(){
    veins=[];
    for(let i=0;i<8;i++){
      const v=mkVein();
      let x=Math.random()*W, y=Math.random()*H;
      const steps=6+Math.floor(Math.random()*8);
      for(let j=0;j<steps;j++){
        v.pts.push({x,y});
        x+=( Math.random()-.5)*200; y+=( Math.random()-.5)*150;
        x=Math.max(0,Math.min(W,x)); y=Math.max(0,Math.min(H,y));
      }
      veins.push(v);
    }
  }
  function drawRBC(x,y,r,a,rot){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=a;
    ctx.beginPath(); ctx.ellipse(0,0,r,r*.62,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(0,0,r*.08,0,0,r);
    g.addColorStop(0,'rgba(160,18,18,.28)');
    g.addColorStop(.5,'rgba(192,40,40,.9)');
    g.addColorStop(1,'rgba(100,8,8,.5)');
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,0,r*.3,r*.18,0,0,Math.PI*2);
    ctx.fillStyle='rgba(60,0,0,.4)'; ctx.fill();
    ctx.restore();
  }
  function drawWBC(x,y,r,a){
    ctx.save(); ctx.globalAlpha=a*.45;
    ctx.beginPath();
    const pts=8; 
    for(let i=0;i<pts;i++){
      const angle=(i/pts)*Math.PI*2;
      const nr=r*(.6+Math.sin(angle*3+tick*.01)*.25);
      i===0?ctx.moveTo(x+Math.cos(angle)*nr,y+Math.sin(angle)*nr):ctx.lineTo(x+Math.cos(angle)*nr,y+Math.sin(angle)*nr);
    }
    ctx.closePath();
    ctx.fillStyle='rgba(80,120,255,.1)'; ctx.fill();
    ctx.strokeStyle='rgba(80,120,255,.2)'; ctx.lineWidth=.8; ctx.stroke();
    ctx.restore();
  }
  function drawPlatelet(x,y,r,a,rot){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=a*.6;
    ctx.beginPath(); ctx.ellipse(0,0,r*.75,r*.4,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,190,70,.18)'; ctx.fill();
    ctx.strokeStyle='rgba(255,190,70,.35)'; ctx.lineWidth=.7; ctx.stroke();
    ctx.restore();
  }
  function drawVeins(){
    veins.forEach(v=>{
      v.flow+=v.speed;
      if(v.pts.length<2) return;
      ctx.save(); ctx.lineWidth=v.width;
      ctx.beginPath(); ctx.moveTo(v.pts[0].x,v.pts[0].y);
      for(let i=1;i<v.pts.length;i++) ctx.lineTo(v.pts[i].x,v.pts[i].y);
      ctx.strokeStyle=v.color; ctx.stroke();
      // Flowing pulse
      const totalPts=v.pts.length;
      const pulseIdx=Math.floor((v.flow%1)*totalPts);
      if(pulseIdx<totalPts){
        const pt=v.pts[pulseIdx];
        const pg=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,6);
        pg.addColorStop(0,'rgba(192,57,43,.35)'); pg.addColorStop(1,'rgba(192,57,43,0)');
        ctx.beginPath(); ctx.arc(pt.x,pt.y,6,0,Math.PI*2);
        ctx.fillStyle=pg; ctx.fill();
      }
      ctx.restore();
    });
  }
  function loop(){
    tick++;
    ctx.clearRect(0,0,W,H);
    drawVeins();
    cells.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotS;
      p.phase+=p.speed; p.y+=Math.sin(p.phase)*.2;
      if(p.x<-p.r*2) p.x=W+p.r; if(p.x>W+p.r) p.x=-p.r*2;
      if(p.y<-p.r*2) p.y=H+p.r; if(p.y>H+p.r) p.y=-p.r*2;
      const a=p.alpha*(.65+.35*Math.sin(p.phase*1.4));
      if(p.type==='rbc') drawRBC(p.x,p.y,p.r,a,p.rot);
      else if(p.type==='wbc') drawWBC(p.x,p.y,p.r,a);
      else drawPlatelet(p.x,p.y,p.r,a,p.rot);
    });
    requestAnimationFrame(loop);
  }
  resize();
  cells=Array.from({length:22},mkCell);
  buildVeins();
  loop();
  window.addEventListener('resize',()=>{ resize(); buildVeins(); });
})();

  try{

      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages}),

    const d=await r.json();
    return d.content?.[0]?.text||'No response.';
  }catch(e){ return 'Network error. Please try again.'; }
}

      const val=Math.round((frame/steps)*target);
      el.textContent=val+suffix;
      if(frame>=steps){ el.textContent=target+suffix; clearInterval(timer); }
    },1000/fps);

function initWorldMap(){
  const canvas=document.getElementById('world-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  let W,H,dots=[],phase=0,hovered=null,raf;
  function resize(){
    W=canvas.width=canvas.offsetWidth;
    H=canvas.height=canvas.offsetHeight;
    buildDots();
  }
  function project(lat,lng){ return {x:(lng+180)/360*W, y:(90-lat)/180*H}; }
  function buildDots(){
    dots=CRISIS.map(d=>{
      const {x,y}=project(d.lat,d.lng);
      return {...d,px:x,py:y,scale:1};
    });
  }
  function drawGrid(){
    ctx.save();
    for(let lat=-60;lat<=60;lat+=30){
      const {y}=project(lat,0);
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y);
      ctx.strokeStyle=lat===0?'rgba(0,255,240,0.07)':'rgba(0,255,240,0.03)';
      ctx.lineWidth=lat===0?1:.5; ctx.stroke();
    }
    for(let lng=-120;lng<=180;lng+=60){
      const {x}=project(0,lng);
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H);
      ctx.strokeStyle='rgba(0,255,240,0.025)'; ctx.lineWidth=.5; ctx.stroke();
    }
    ctx.restore();
  }
  function drawDots(){
    dots.forEach((d,i)=>{
      const isSel=crisisState.sel===d.c;
      const isHov=hovered===i;
      d.scale+=(((isSel||isHov)?1.8:1)-d.scale)*.1;
      const col=barColor(d.s);
      const r=(3.5+d.s/18)*d.scale;
      // Ripple
      if(isSel||isHov){
        [r+5,r+10].forEach((rr,ri)=>{
          ctx.beginPath(); ctx.arc(d.px,d.py,rr+Math.sin(phase*3+i)*(ri+1)*2,0,Math.PI*2);
          ctx.strokeStyle=col+(ri===0?'55':'22'); ctx.lineWidth=1.2; ctx.stroke();
        });
      }
      // Glow
      const g=ctx.createRadialGradient(d.px,d.py,0,d.px,d.py,r*3);
      g.addColorStop(0,col+'55'); g.addColorStop(1,col+'00');
      ctx.beginPath(); ctx.arc(d.px,d.py,r*3,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      // Core
      ctx.beginPath(); ctx.arc(d.px,d.py,r,0,Math.PI*2);
      const cg=ctx.createRadialGradient(d.px-r*.3,d.py-r*.3,0,d.px,d.py,r);
      cg.addColorStop(0,col+'ff'); cg.addColorStop(1,col+'bb');
      ctx.fillStyle=cg; ctx.fill();
      // Label
      if(isSel||isHov){
        ctx.save();
        ctx.fillStyle='rgba(255,255,255,.9)';
        ctx.font=`bold ${Math.max(9,10*d.scale*.75)}px Rajdhani,sans-serif`;
        ctx.textAlign='center'; ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=6;
        ctx.fillText(d.c,d.px,d.py-r-6);
        ctx.restore();
      }
    });
  }
  function loop(){
    phase+=.015;
    ctx.clearRect(0,0,W,H);
    drawGrid(); drawDots();
    raf=requestAnimationFrame(loop);
  }
  function hit(mx,my){
    for(let i=dots.length-1;i>=0;i--){
      const d=dots[i];
      if(Math.hypot(mx-d.px,my-d.py)<(4+d.s/14)*2) return i;
    }
    return null;
  }
  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect();
    const sx=W/rect.width,sy=H/rect.height;
    const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
    hovered=hit(mx,my);
    canvas.style.cursor=hovered!==null?'pointer':'default';
    const tip=document.getElementById('map-tip'); if(!tip) return;
    if(hovered!==null){
      const d=CRISIS[hovered];
      tip.style.opacity='1';
      tip.style.left=(e.clientX-canvas.getBoundingClientRect().left+16)+'px';
      tip.style.top=(e.clientY-canvas.getBoundingClientRect().top-20)+'px';
      tip.innerHTML=`<div class="map-tip-name">${d.f} ${d.c}</div><div class="map-tip-row"><div class="tip-dot" style="background:${barColor(d.s)}"></div>${d.s}% shortage</div><div class="map-tip-row">Needs ${d.need}M · Has ${d.have}M units/yr</div>`;
    } else { tip.style.opacity='0'; }
  });
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width), my=(e.clientY-rect.top)*(H/rect.height);
    const h=hit(mx,my);
    if(h!==null){ selectCountry(CRISIS[h].c); }
  });
  const ro=new ResizeObserver(()=>{ clearTimeout(ro._t); ro._t=setTimeout(()=>{ resize(); },100); });
  ro.observe(canvas.parentElement);
  resize(); loop();
  // Store raf for cleanup
  canvas._raf=raf;
}

  const wrap=document.getElementById('case-card-wrap'); if(!wrap) return;
  const c=CASES[caseState.idx];
  const isDone=caseState.idx in caseState.answered;
  const dc=c.diff==='Beginner'?'b':c.diff==='Intermediate'?'i':'a';
  wrap.innerHTML=`
    <div class="panel" style="padding:1.75rem" id="case-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap">
        <span class="diff-tag ${dc}">${c.diff}</span>
        <span style="font-family:var(--mono);font-size:.65rem;color:var(--text3);letter-spacing:1px">// ${c.tag}</span>
        <span style="margin-left:auto;font-family:var(--mono);font-size:.68rem;color:var(--text3)">CASE ${caseState.idx+1}/${CASES.length}</span>
      </div>
      <div class="case-q">${c.q}</div>
      <div id="opts-container">
        ${c.opts.map((opt,i)=>{
          let cls='opt';
          if(isDone){ if(i===c.ans) cls+=' correct'; else if(i===caseState.answered[caseState.idx]&&i!==c.ans) cls+=' wrong'; }
          return `<button class="${cls}" ${isDone?'disabled':''} onclick="chooseAnswer(${i})"><span class="opt-key">${String.fromCharCode(65+i)}</span><span>${opt}</span></button>`;
        }).join('')}
      </div>
      ${isDone?`<div class="explanation"><strong>◈ CLINICAL EXPLANATION: </strong>${c.explain}</div>`:''}
      <div class="case-footer">
        <button class="case-nav-btn" onclick="navCase(${caseState.idx-1})" ${caseState.idx===0?'disabled':''}>◀ PREV</button>
        <div class="score-display">SCORE: <strong>${Object.entries(caseState.answered).filter(([i,v])=>v===CASES[+i].ans).length}</strong>/${CASES.length}</div>
        <button class="case-nav-btn" onclick="navCase(${caseState.idx+1})" ${caseState.idx===CASES.length-1||!isDone?'disabled':''}>NEXT ▶</button>
      </div>
    </div>`;
}

function renderCasesSidebar(){
  // Progress dots
  const dots=document.getElementById('prog-dots');
  if(dots){
    dots.innerHTML=CASES.map((_,i)=>{
      let cls='pdot';
      if(i===caseState.idx) cls+=' cur';
      else if(i in caseState.answered) cls+=caseState.answered[i]===CASES[i].ans?' done':' wrong-done';
      return `<div class="${cls}" onclick="navCase(${i})" title="Case ${i+1}"></div>`;
    }).join('');
  }
  // Score row
  const sr=document.getElementById('score-row');
  if(sr){
    const correct=Object.entries(caseState.answered).filter(([i,v])=>v===CASES[+i].ans).length;
    const wrong=Object.keys(caseState.answered).length-correct;
    const left=CASES.length-Object.keys(caseState.answered).length;
    sr.innerHTML=[['✓',correct,'#00ff80','Correct'],['✗',wrong,'var(--blood3)','Wrong'],['○',left,'var(--text3)','Left']].map(([s,v,c,l])=>`<div><div style="font-family:var(--disp);font-size:1.8rem;color:${c}">${v}</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px">${l}</div></div>`).join('');
  }
  // Topics
  const tc=document.getElementById('topics-chips');
  if(tc){
    tc.innerHTML=CASES.map((cas,i)=>{
      const cls=i in caseState.answered?(caseState.answered[i]===cas.ans?'chip g':'chip b'):'chip dim';
      return `<span class="${cls}" style="cursor:pointer" onclick="navCase(${i})">${cas.tag}</span>`;
    }).join('');
  }
  // Feedback
  const fb=document.getElementById('feedback-body');
  if(fb){
    const isDone=caseState.idx in caseState.answered;
    if(!isDone){
      fb.innerHTML='<span style="color:var(--text3);font-family:var(--mono);font-size:.7rem;font-style:italic">AWAITING RESPONSE...</span>';
    } else if(caseState.feedback[caseState.idx]){
      fb.textContent=caseState.feedback[caseState.idx];
    } else {
      fb.innerHTML='<span style="color:var(--text3);font-family:var(--mono);font-size:.7rem;font-style:italic">GENERATING FEEDBACK...</span>';
    }
  }
}

async function chooseAnswer(opt){
  const idx=caseState.idx;
  if(idx in caseState.answered) return;
  caseState.answered[idx]=opt;
  renderCaseCard();
  renderCasesSidebar();
  // Get AI feedback
  const c=CASES[idx];
  const ok=opt===c.ans;
  const txt=await askClaude(
    [{role:'user',content:`Case: "${c.q}" Student chose: "${c.opts[opt]}". Correct answer: "${c.opts[c.ans]}". They were ${ok?'CORRECT':'WRONG'}. Teach "${c.tag}" in 65 words. Be warm and educational.`}],
    'You are HemoLearn AI clinical educator. Give concise, encouraging, educational feedback.'
  );
  caseState.feedback[idx]=txt;
  renderCasesSidebar();
}

function navCase(i){
  if(i<0||i>=CASES.length) return;
  caseState.idx=i;
  renderCaseCard();
  renderCasesSidebar();
  gsap.fromTo('#case-card',{opacity:0,x:16},{opacity:1,x:0,duration:.35,ease:'power3.out'});
}

window.addEventListener('DOMContentLoaded', ()=>{ goTab('home'); });
</script>
